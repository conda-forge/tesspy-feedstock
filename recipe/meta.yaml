{% set name = "tesspy" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: f3b80ec76110672c891d546a38fc602a50c5b8eb7198e58aedb03c30ee9bb4fb

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python >=3.7
  run:
    - geopandas >=0.10.0
    - h3-py
    - hdbscan
    - mercantile
    - osmnx
    - python >=3.7
    - scikit-learn
    - scipy

test:
  imports:
    - tesspy

about:
  home: https://github.com/siavash-saki/tesspy
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.md
  summary: Tessellation of Urban Areas
  doc_url: https://tesspy.readthedocs.io
  dev_url: https://github.com/siavash-saki

extra:
  recipe-maintainers:
    - siavash-saki
